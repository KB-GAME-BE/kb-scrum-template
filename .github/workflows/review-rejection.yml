name: 需求打回记录

on:
  issue_comment:
    types: [created]

jobs:
  record-rejection:
    name: 记录需求打回
    if: |
      startsWith(github.event.comment.body, '/reject') &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write

    steps:
      - name: 记录打回信息并更新 Review Rejections
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const commentId = context.payload.comment.id;
            const commentBody = context.payload.comment.body;
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const commenter = context.payload.comment.user.login;
            const now = new Date().toISOString().split('T')[0];

            // 只处理 Feature Issue
            if (!/^\[Feature\]/i.test(issueTitle)) {
              console.log(`Issue #${issueNumber} 不是 Feature，跳过`);
              return;
            }

            // 提取 /reject 后面的原因
            const reason = commentBody.replace(/^\/reject\s*/i, '').trim() || '（未填写打回原因）';

            // 直接编辑原始评论，改成格式化记录（不新建）
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: `## ❌ 需求打回记录\n\n` +
                    `- **打回人：** @${commenter}\n` +
                    `- **打回原因：** ${reason}\n` +
                    `- **时间：** ${now}`
            });

            console.log(`✅ 已更新 Issue #${issueNumber} 的打回记录`);

            // 查询 Project 信息
            const org = context.repo.owner;
            const projectNumber = 6;

            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            const projectId = project.id;

            // 找 Review Rejections 字段
            const reviewRejectionsField = project.fields.nodes.find(f => f.name === 'Review Rejections');

            // 找 Status 字段和 In Progress 选项
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const inProgressOption = statusField?.options?.find(o => o.name.toLowerCase() === 'in progress');

            // 查询 Issue 的 Project Item
            const itemQuery = await github.graphql(`
              query($org: String!, $repo: String!, $issue: Int!) {
                repository(owner: $org, name: $repo) {
                  issue(number: $issue) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                        fieldValueByName(name: "Review Rejections") {
                          ... on ProjectV2ItemFieldNumberValue {
                            number
                          }
                        }
                        statusValue: fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              org: context.repo.owner,
              repo: context.repo.repo,
              issue: issueNumber
            });

            const projectItem = itemQuery.repository.issue.projectItems.nodes.find(
              item => item.project.id === projectId
            );

            if (!projectItem) {
              console.log(`Issue #${issueNumber} 不在 Project 中，跳过`);
              return;
            }

            // 检查当前 Status 是否为 In Review，不是则跳过
            const currentStatus = projectItem.statusValue?.name || '';
            if (currentStatus.toLowerCase() !== 'in review') {
              console.log(`Issue #${issueNumber} 当前状态是 "${currentStatus}"，不是 In Review，跳过`);
              return;
            }

            // Status 改为 In Progress
            if (statusField && inProgressOption) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId,
                itemId: projectItem.id,
                fieldId: statusField.id,
                optionId: inProgressOption.id
              });
              console.log(`✅ Issue #${issueNumber} Status → In Progress`);
            }

            // Review Rejections +1
            if (reviewRejectionsField) {
              const currentValue = projectItem.fieldValueByName?.number || 0;
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { number: $value }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId,
                itemId: projectItem.id,
                fieldId: reviewRejectionsField.id,
                value: currentValue + 1
              });
              console.log(`✅ Issue #${issueNumber} Review Rejections: ${currentValue} → ${currentValue + 1}`);
            }
