name: PR 规范检查

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-closes:
    name: 检查关联任务
    runs-on: ubuntu-latest
    steps:
      - name: 检查是否包含 Closes #xxx
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /closes\s+#\d+/i;
            
            if (!pattern.test(body)) {
              core.setFailed(
                '❌ PR 描述中缺少关联任务！\n' +
                '请在描述中添加：Closes #任务编号（如：Closes #13）'
              );
            } else {
              const match = body.match(/closes\s+#(\d+)/i);
              console.log(`✅ 已关联任务 #${match[1]}`);
            }

  check-checklist:
    name: 检查自测 Checklist
    runs-on: ubuntu-latest
    steps:
      - name: 检查是否全部勾选
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            
            // 未勾选的 checkbox：- [ ]
            const unchecked = (body.match(/- \[ \]/g) || []).length;
            // 已勾选的 checkbox：- [x]
            const checked = (body.match(/- \[x\]/gi) || []).length;
            
            if (unchecked > 0) {
              core.setFailed(
                `❌ 自测 Checklist 未完成！还有 ${unchecked} 项未勾选。\n` +
                `请完成所有自测项后再提交 PR。`
              );
            } else if (checked === 0) {
              core.setFailed(
                '❌ 未找到任何 Checklist 项，请使用标准 PR 模板。'
              );
            } else {
              console.log(`✅ Checklist 全部完成，共 ${checked} 项`);
            }
