name: PR Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name and Lark task ID
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';
            
            // 提取分支类型
            const branchType = branch.split('/')[0].toLowerCase();
            
            // 需要关联 Lark 任务的类型
            const requireTaskId = ['feat', 'fix', 'hotfix', 'refactor'];
            // 不需要关联的类型
            const skipTaskId = ['chore', 'docs', 'style'];
            // 所有合法类型
            const validTypes = [...requireTaskId, ...skipTaskId];
            
            // 检查分支命名是否规范
            if (!validTypes.includes(branchType)) {
              core.setFailed(
                `❌ 分支命名不规范: ${branch}\n` +
                `分支名必须以以下前缀开头: ${validTypes.join('/')}\n` +
                `示例: feat/colorgame-support, fix/bet-list-display`
              );
              return;
            }
            
            // 需要关联任务的类型，检查 TASK_ID
            if (requireTaskId.includes(branchType)) {
              const taskIdMatch = body.match(/TASK_ID:\s*(.+)/);
              const taskId = taskIdMatch ? taskIdMatch[1].trim() : '';
              
              if (!taskId) {
                core.setFailed(
                  `❌ ${branchType} 类型的 PR 必须填写 Lark 任务ID\n` +
                  `请在 PR 描述中填写 TASK_ID: 后面的任务编号\n` +
                  `示例: TASK_ID: 5 或 TASK_ID: 5,6`
                );
                return;
              }
              
              // 验证 TASK_ID 格式（数字，逗号分隔）
              const ids = taskId.split(',').map(id => id.trim());
              const allValid = ids.every(id => /^\d+$/.test(id));
              
              if (!allValid) {
                core.setFailed(
                  `❌ TASK_ID 格式错误: ${taskId}\n` +
                  `请填写数字，多个用逗号分隔\n` +
                  `示例: TASK_ID: 5 或 TASK_ID: 5,6`
                );
                return;
              }
              
              core.info(`✅ 分支类型: ${branchType}, 任务ID: ${taskId}`);
            } else {
              core.info(`✅ 分支类型: ${branchType}, 无需关联 Lark 任务`);
            }
