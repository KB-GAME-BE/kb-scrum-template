name: PR 打回记录

on:
  pull_request_review:
    types: [submitted]

jobs:
  record-rejection:
    name: 记录 PR 打回
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write

    steps:
      - name: 记录打回信息并更新 PR Rejections
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const stripped = body.replace(/<!--[\s\S]*?-->/g, '');
            const pattern = /closes\s+#(\d+)/gi;
            const matches = [...stripped.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('没有找到关联 Issue，跳过');
              return;
            }

            const reviewer = context.payload.review.user.login;
            const reviewBody = context.payload.review.body || '（未填写打回原因）';
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const now = new Date().toISOString().split('T')[0];

            const org = context.repo.owner;
            const projectNumber = 6;

            // 查询 Project 信息
            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            const projectId = project.id;
            const prRejectionsField = project.fields.nodes.find(f => f.name === 'PR Rejections');

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);

              // 在 Task Issue 上添加打回记录 Comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `## ❌ PR 打回记录\n\n` +
                      `- **打回人：** @${reviewer}\n` +
                      `- **关联 PR：** #${prNumber} ${prTitle}\n` +
                      `- **打回原因：** ${reviewBody}\n` +
                      `- **时间：** ${now}`
              });

              console.log(`✅ 已在 Issue #${issueNumber} 添加打回记录`);

              // 更新 PR Rejections 字段 +1
              if (!prRejectionsField) {
                console.log('未找到 PR Rejections 字段，跳过计数');
                continue;
              }

              // 查询 Issue 当前的 Project Item 和字段值
              const issueQuery = await github.graphql(`
                query($org: String!, $repo: String!, $issue: Int!) {
                  repository(owner: $org, name: $repo) {
                    issue(number: $issue) {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project { id }
                          fieldValueByName(name: "PR Rejections") {
                            ... on ProjectV2ItemFieldNumberValue {
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                org: context.repo.owner,
                repo: context.repo.repo,
                issue: issueNumber
              });

              const projectItem = issueQuery.repository.issue.projectItems.nodes.find(
                item => item.project.id === projectId
              );

              if (!projectItem) {
                console.log(`Issue #${issueNumber} 不在 Project 中，跳过`);
                continue;
              }

              const currentValue = projectItem.fieldValueByName?.number || 0;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { number: $value }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId,
                itemId: projectItem.id,
                fieldId: prRejectionsField.id,
                value: currentValue + 1
              });

              console.log(`✅ Issue #${issueNumber} PR Rejections: ${currentValue} → ${currentValue + 1}`);
            }
