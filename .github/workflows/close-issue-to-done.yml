name: PR 合并后自动更新 Project Status

on:
  pull_request:
    types: [closed]

jobs:
  update-project-status:
    name: 关联任务变 Done
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write

    steps:
      - name: 提取关联 Issue 编号并更新 Project Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            // 去掉 HTML 注释后提取所有 Closes #xxx
            const stripped = body.replace(/<!--[\s\S]*?-->/g, '');
            const pattern = /closes\s+#(\d+)/gi;
            const matches = [...stripped.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('没有找到关联 Issue，跳过');
              return;
            }

            const org = context.repo.owner;
            const projectNumber = 1; // ← 你的 Project 编号，在 Project URL 里能看到

            // 查询 Project ID 和 Status 字段信息
            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            const projectId = project.id;

            // 找 Status 字段和 Done 选项
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            if (!statusField) {
              console.log('未找到 Status 字段');
              return;
            }
            const doneOption = statusField.options.find(o => o.name === 'Done');
            if (!doneOption) {
              console.log('未找到 Done 选项');
              return;
            }

            // 逐个处理关联 Issue
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);

              // 查询 Issue 对应的 Project Item ID
              const issueQuery = await github.graphql(`
                query($org: String!, $repo: String!, $issue: Int!) {
                  repository(owner: $org, name: $repo) {
                    issue(number: $issue) {
                      id
                      title
                      projectItems(first: 10) {
                        nodes {
                          id
                          project {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                org: context.repo.owner,
                repo: context.repo.repo,
                issue: issueNumber
              });

              const issue = issueQuery.repository.issue;
              const projectItem = issue.projectItems.nodes.find(
                item => item.project.id === projectId
              );

              if (!projectItem) {
                console.log(`Issue #${issueNumber} 不在 Project 中，跳过`);
                continue;
              }

              // 更新 Status 为 Done
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `, {
                projectId,
                itemId: projectItem.id,
                fieldId: statusField.id,
                optionId: doneOption.id
              });

              console.log(`✅ Issue #${issueNumber}（${issue.title}）Status 已更新为 Done`);
            }
