name: CR Review Sync to Lark

on:
  pull_request_review:
    types: [submitted]

jobs:
  sync-cr-reject:
    # 只在 changes_requested 时触发
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Sync CR reject to Lark
        uses: actions/github-script@v7
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_CR_TABLE_ID: ${{ secrets.LARK_CR_TABLE_ID }}
          LARK_TASK_TABLE_ID: ${{ secrets.LARK_TASK_TABLE_ID }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title;
            const prUrl = context.payload.pull_request.html_url;
            const reviewer = context.payload.review.user.login;
            const reviewBody = context.payload.review.body || '无评论';
            const branch = context.payload.pull_request.head.ref;
            
            // 提取 TASK_ID
            const taskIdMatch = prBody.match(/TASK_ID:[ \t]*(.+)/);
            const taskIdStr = taskIdMatch ? taskIdMatch[1].trim() : '';
            
            if (!taskIdStr) {
              core.info('没有 TASK_ID，跳过 Lark 同步，仅发通知');
              // 发飞书群通知（无任务关联）
              if (process.env.LARK_WEBHOOK_URL) {
                await fetch(process.env.LARK_WEBHOOK_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    msg_type: 'interactive',
                    card: {
                      header: {
                        title: { tag: 'plain_text', content: '⚠️ CR 打回通知' },
                        template: 'red'
                      },
                      elements: [
                        {
                          tag: 'div',
                          text: {
                            tag: 'lark_md',
                            content: `**PR:** ${prTitle}\n**打回人:** ${reviewer}\n**评论:** ${reviewBody}\n**链接:** [查看 PR](${prUrl})`
                          }
                        }
                      ]
                    }
                  })
                });
              }
              return;
            }
            
            const taskIds = taskIdStr.split(',').map(id => id.trim());
            core.info(`TASK_ID: ${taskIds.join(', ')}, Reviewer: ${reviewer}`);
            
            // ========== Step 1: 获取飞书 tenant_access_token ==========
            const tokenRes = await fetch('https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                app_id: process.env.LARK_APP_ID,
                app_secret: process.env.LARK_APP_SECRET
              })
            });
            const tokenData = await tokenRes.json();
            
            if (tokenData.code !== 0) {
              core.setFailed(`获取飞书 token 失败: ${JSON.stringify(tokenData)}`);
              return;
            }
            const token = tokenData.tenant_access_token;
            
            // ========== Step 2: 查找任务记录（通过任务ID字段匹配） ==========
            for (const taskId of taskIds) {
              // 在版本开发计划表中查找 任务ID = taskId 的记录
              const searchRes = await fetch(
                `https://open.larksuite.com/open-apis/bitable/v1/apps/${process.env.LARK_BASE_APP_TOKEN}/tables/${process.env.LARK_TASK_TABLE_ID}/records/search`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                  },
                  body: JSON.stringify({
                    filter: {
                      conjunction: 'and',
                      conditions: [
                        {
                          field_name: '任务ID',
                          operator: 'is',
                          value: [taskId]
                        }
                      ]
                    }
                  })
                }
              );
              const searchData = await searchRes.json();
              
              if (searchData.code !== 0 || !searchData.data?.items?.length) {
                core.warning(`未找到任务ID=${taskId}的记录: ${JSON.stringify(searchData)}`);
                continue;
              }
              
              const taskRecord = searchData.data.items[0];
              const taskRecordId = taskRecord.record_id;
              
              // ========== Step 3: 在 CR 打回记录表新增记录 ==========
              const now = new Date();
              const createRes = await fetch(
                `https://open.larksuite.com/open-apis/bitable/v1/apps/${process.env.LARK_BASE_APP_TOKEN}/tables/${process.env.LARK_CR_TABLE_ID}/records`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                  },
                  body: JSON.stringify({
                    fields: {
                      'CR 打回标题': `CR 打回: ${prTitle}`,
                      '关联任务': [{ record_id: taskRecordId }],
                      '问题描述': `${reviewBody}\n\nPR: ${prUrl}`,
                      '记录时间': now.getTime()
                    }
                  })
                }
              );
              const createData = await createRes.json();
              
              if (createData.code !== 0) {
                core.warning(`创建 CR 打回记录失败 (任务ID=${taskId}): ${JSON.stringify(createData)}`);
              } else {
                core.info(`✅ 已为任务ID=${taskId}创建 CR 打回记录`);
              }
            }
            
            // ========== Step 4: 发飞书群通知 ==========
            if (process.env.LARK_WEBHOOK_URL) {
              await fetch(process.env.LARK_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  msg_type: 'interactive',
                  card: {
                    header: {
                      title: { tag: 'plain_text', content: '⚠️ CR 打回通知' },
                      template: 'red'
                    },
                    elements: [
                      {
                        tag: 'div',
                        text: {
                          tag: 'lark_md',
                          content: `**PR:** ${prTitle}\n**打回人:** ${reviewer}\n**任务ID:** ${taskIds.join(', ')}\n**评论:** ${reviewBody}\n**链接:** [查看 PR](${prUrl})`
                        }
                      }
                    ]
                  }
                })
              });
              core.info('✅ 已发送飞书群通知');
            }
