name: Feature 需求
description: 新功能需求
labels: ["feature"]
title: "[Feature] "
body:
  - type: textarea
    id: description
    attributes:
      label: 需求说明
      placeholder: |
        作为 xxx 用户，我希望 xxx，以便 xxx

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] 条件一
        - [ ] 条件二

  - type: textarea
    id: scope
    attributes:
      label: 涉及范围
      placeholder: |
        - 后端：xxx 模块
        - 前端：xxx 页面

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 - 紧急阻塞
        - P1 - 重要
        - P2 - 普通

  - type: input
    id: estimate
    attributes:
      label: 故事点估算
      placeholder: "1 / 2 / 3 / 5 / 8"
