name: Task 任务
description: 需求拆解出的开发任务（Sub-issue）
labels: ["task"]
title: "[Task] 前端/后端-"
body:
  - type: textarea
    id: description
    attributes:
      label: 任务说明
      placeholder: 简要描述开发内容

  - type: textarea
    id: checklist
    attributes:
      label: 完成条件
      placeholder: |
        - [ ] 接口开发完成
        - [ ] 联调通过

  - type: input
    id: parent
    attributes:
      label: 关联需求
      placeholder: "关联 Feature Issue 编号，例：#11"
