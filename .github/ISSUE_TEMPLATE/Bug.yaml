name: Bug 缺陷
description: 功能缺陷（Sub-issue，挂在对应需求下）
labels: ["bug"]
body:
  - type: input
    id: title-hint
    attributes:
      label: 标题格式
      description: 请在页面顶部标题框填写，格式：[Bug] 描述现象（不写原因）
      placeholder: 例：[Bug] 开奖结果精度丢失
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入 xxx 页面
        2. 点击 xxx 按钮
        3. 观察到 xxx
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: attachment
    attributes:
      label: 截图 / 日志
      placeholder: 粘贴截图或相关日志
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 - 阻塞，无法继续
        - P1 - 重要，影响主流程
        - P2 - 建议修复
    validations:
      required: true
