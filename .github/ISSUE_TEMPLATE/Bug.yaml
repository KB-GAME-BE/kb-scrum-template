name: Bug 缺陷
description: 功能缺陷
labels: ["bug"]
title: "[Bug] "
body:
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入 xxx 页面
        2. 点击 xxx 按钮
        3. 观察到 xxx

  - type: textarea
    id: expected
    attributes:
      label: 期望结果

  - type: textarea
    id: actual
    attributes:
      label: 实际结果

  - type: textarea
    id: attachment
    attributes:
      label: 截图 / 日志
      placeholder: 粘贴截图或相关日志

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 - 阻塞，无法继续
        - P1 - 重要，影响主流程
        - P2 - 建议修复
